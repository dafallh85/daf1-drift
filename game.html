<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DAF1 Drift</title>

<style>

body{
margin:0;
overflow:hidden;
font-family:Arial;
background:#87CEEB;
}

canvas{
display:block;
}

#ui{
position:absolute;
top:20px;
left:20px;
color:white;
z-index:100;
}

#speed{
font-size:35px;
font-weight:bold;
color:#00ffcc;
text-shadow:0 0 10px black;
}

#coins{
font-size:22px;
margin-top:10px;
}

.controls{
position:absolute;
bottom:20px;
width:100%;
display:flex;
justify-content:center;
gap:20px;
z-index:100;
}

.btn{
width:85px;
height:85px;
border:none;
border-radius:50%;
font-size:30px;
font-weight:bold;
background:#00ffcc;
color:black;
box-shadow:0 0 20px #00ffcc;
}

</style>
</head>

<body>

<div id="ui">
<div id="speed">0 KM/H</div>
<div id="coins">DAF1 Coins: 500</div>
</div>

<div class="controls">
<button class="btn" id="left">◀</button>
<button class="btn" id="gas">▲</button>
<button class="btn" id="right">▶</button>
</div>

<script src="https://cdn.jsdelivr.net/npm/three@0.152.2/build/three.min.js"></script>

<script>

const scene = new THREE.Scene();

scene.background = new THREE.Color(0x87CEEB);

const camera = new THREE.PerspectiveCamera(
75,
window.innerWidth/window.innerHeight,
0.1,
1000
);

const renderer = new THREE.WebGLRenderer({
antialias:true
});

renderer.setSize(window.innerWidth,window.innerHeight);

document.body.appendChild(renderer.domElement);

const ambient = new THREE.AmbientLight(0xffffff,1.5);

scene.add(ambient);

const sun = new THREE.DirectionalLight(0xffffff,2);

sun.position.set(10,20,10);

scene.add(sun);

const road = new THREE.Mesh(

new THREE.PlaneGeometry(20,400),

new THREE.MeshStandardMaterial({
color:0x333333
})

);

road.rotation.x = -Math.PI/2;

scene.add(road);

const roadLines = [];

for(let i=0;i<40;i++){

const line = new THREE.Mesh(

new THREE.BoxGeometry(0.5,0.05,4),

new THREE.MeshBasicMaterial({
color:0xffffff
})

);

line.position.set(0,0.05,-i*10);

scene.add(line);

roadLines.push(line);

}

const buildings = [];

for(let i=0;i<80;i++){

const h = Math.random()*20+10;

const building = new THREE.Mesh(

new THREE.BoxGeometry(5,h,5),

new THREE.MeshStandardMaterial({
color:0xb0b0b0
})

);

const side = Math.random()>0.5 ? 1 : -1;

building.position.x = side*(Math.random()*15+8);

building.position.y = h/2;

building.position.z = -Math.random()*400;

scene.add(building);

buildings.push(building);

}

const car = new THREE.Group();

const body = new THREE.Mesh(

new THREE.BoxGeometry(2.5,0.8,5),

new THREE.MeshStandardMaterial({
color:0x111111,
metalness:1,
roughness:0.2
})

);

body.position.y = 0.8;

car.add(body);

const top = new THREE.Mesh(

new THREE.BoxGeometry(1.8,0.7,2.5),

new THREE.MeshStandardMaterial({
color:0x222222
})

);

top.position.set(0,1.3,-0.3);

car.add(top);

function wheel(x,z){

const w = new THREE.Mesh(

new THREE.CylinderGeometry(0.45,0.45,0.5,32),

new THREE.MeshStandardMaterial({
color:0x000000
})

);

w.rotation.z = Math.PI/2;

w.position.set(x,0.4,z);

car.add(w);

}

wheel(-1,-1.5);
wheel(1,-1.5);
wheel(-1,1.5);
wheel(1,1.5);

scene.add(car);

camera.position.set(0,6,10);

let speed = 0;

document.getElementById("gas").onmousedown = ()=>{
speed = 1.5;
};

document.getElementById("gas").ontouchstart = ()=>{
speed = 1.5;
};

document.getElementById("left").onclick = ()=>{
car.position.x -= 1;
};

document.getElementById("right").onclick = ()=>{
car.position.x += 1;
};

function animate(){

requestAnimationFrame(animate);

roadLines.forEach(line=>{

line.position.z += speed;

if(line.position.z > 10){

line.position.z = -390;

}

});

buildings.forEach(building=>{

building.position.z += speed;

if(building.position.z > 20){

building.position.z = -400;

}

});

speed *= 0.99;

document.getElementById("speed").innerText =
Math.floor(speed*160)+" KM/H";

renderer.render(scene,camera);

}

animate();

window.addEventListener("resize",()=>{

camera.aspect = window.innerWidth/window.innerHeight;

camera.updateProjectionMatrix();

renderer.setSize(window.innerWidth,window.innerHeight);

});

</script>

</body>
</html>
