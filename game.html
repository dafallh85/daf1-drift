<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DAF1 Drift</title>

<style>
body{
margin:0;
overflow:hidden;
background:#87CEEB;
font-family:Arial;
}

canvas{
display:block;
}

#ui{
position:absolute;
top:20px;
left:20px;
z-index:10;
color:white;
}

#speed{
font-size:32px;
font-weight:bold;
text-shadow:0 0 10px black;
}

.controls{
position:absolute;
bottom:30px;
width:100%;
display:flex;
justify-content:center;
gap:20px;
z-index:20;
}

.btn{
width:80px;
height:80px;
border:none;
border-radius:50%;
font-size:30px;
font-weight:bold;
background:#00ffcc;
color:black;
}
</style>
</head>

<body>

<div id="ui">
<div id="speed">0 KM/H</div>
</div>

<div class="controls">
<button class="btn" id="left">◀</button>
<button class="btn" id="gas">▲</button>
<button class="btn" id="right">▶</button>
</div>

<script src="https://cdn.jsdelivr.net/npm/three@0.152.2/build/three.min.js"></script>

<script>

const scene = new THREE.Scene();

scene.background = new THREE.Color(0x87CEEB);

const camera = new THREE.PerspectiveCamera(
75,
window.innerWidth/window.innerHeight,
0.1,
1000
);

const renderer = new THREE.WebGLRenderer({
antialias:true
});

renderer.setSize(window.innerWidth,window.innerHeight);

document.body.appendChild(renderer.domElement);

const light = new THREE.DirectionalLight(0xffffff,2);

light.position.set(0,20,10);

scene.add(light);

scene.add(new THREE.AmbientLight(0xffffff,1));

const road = new THREE.Mesh(

new THREE.PlaneGeometry(20,500),

new THREE.MeshStandardMaterial({
color:0x333333
})

);

road.rotation.x = -Math.PI/2;

scene.add(road);

const lines=[];

for(let i=0;i<50;i++){

const line = new THREE.Mesh(

new THREE.BoxGeometry(0.4,0.05,4),

new THREE.MeshBasicMaterial({
color:0xffffff
})

);

line.position.z = -i*10;

line.position.y = 0.05;

scene.add(line);

lines.push(line);

}

const buildings=[];

for(let i=0;i<80;i++){

const h = Math.random()*20+10;

const b = new THREE.Mesh(

new THREE.BoxGeometry(5,h,5),

new THREE.MeshStandardMaterial({
color:0xbcbcbc
})

);

const side = Math.random()>0.5 ? 1 : -1;

b.position.x = side*(Math.random()*15+8);

b.position.y = h/2;

b.position.z = -Math.random()*500;

scene.add(b);

buildings.push(b);

}

const car = new THREE.Group();

const body = new THREE.Mesh(

new THREE.BoxGeometry(2.5,0.8,5),

new THREE.MeshStandardMaterial({
color:0x111111,
metalness:1,
roughness:0.2
})

);

body.position.y = 0.8;

car.add(body);

const top = new THREE.Mesh(

new THREE.BoxGeometry(1.8,0.7,2.5),

new THREE.MeshStandardMaterial({
color:0x222222
})

);

top.position.set(0,1.3,-0.2);

car.add(top);

function wheel(x,z){

const w = new THREE.Mesh(

new THREE.CylinderGeometry(0.45,0.45,0.5,32),

new THREE.MeshStandardMaterial({
color:0x000000
})

);

w.rotation.z = Math.PI/2;

w.position.set(x,0.4,z);

car.add(w);

}

wheel(-1,-1.5);
wheel(1,-1.5);
wheel(-1,1.5);
wheel(1,1.5);

scene.add(car);

camera.position.set(0,6,10);

let speed = 0;

document.getElementById("gas").ontouchstart=()=>{
speed=1.5;
};

document.getElementById("gas").onmousedown=()=>{
speed=1.5;
};

document.getElementById("left").onclick=()=>{
car.position.x -=1;
};

document.getElementById("right").onclick=()=>{
car.position.x +=1;
};

function animate(){

requestAnimationFrame(animate);

lines.forEach(line=>{

line.position.z += speed;

if(line.position.z > 10){

line.position.z = -500;

}

});

buildings.forEach(b=>{

b.position.z += speed;

if(b.position.z > 20){

b.position.z = -500;

}

});

speed *= 0.99;

document.getElementById("speed").innerText =
Math.floor(speed*180)+" KM/H";

renderer.render(scene,camera);

}

animate();

</script>

</body>
</html>
