<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DAF1 Drift</title>

<style>

body{
margin:0;
overflow:hidden;
background:black;
font-family:Arial;
}

canvas{
display:block;
}

#ui{
position:absolute;
top:20px;
left:20px;
z-index:100;
color:white;
}

#speed{
font-size:32px;
font-weight:bold;
color:#00ffcc;
text-shadow:0 0 10px #00ffcc;
}

#coins{
font-size:22px;
margin-top:10px;
}

.controls{
position:absolute;
bottom:25px;
width:100%;
display:flex;
justify-content:center;
gap:20px;
z-index:100;
}

.btn{
width:85px;
height:85px;
border:none;
border-radius:50%;
background:#00ffcc;
color:black;
font-size:30px;
font-weight:bold;
box-shadow:0 0 20px #00ffcc;
}

</style>
</head>

<body>

<div id="ui">
<div id="speed">0 KM/H</div>
<div id="coins">DAF1 Coins: 500</div>
</div>

<div class="controls">
<button class="btn" id="left">◀</button>
<button class="btn" id="gas">▲</button>
<button class="btn" id="right">▶</button>
</div>

<script src="https://cdn.jsdelivr.net/npm/three@0.152.2/build/three.min.js"></script>

<script>

const scene = new THREE.Scene();

scene.fog = new THREE.Fog(0x87CEEB,40,180);

const camera = new THREE.PerspectiveCamera(
75,
window.innerWidth/window.innerHeight,
0.1,
1000
);

const renderer = new THREE.WebGLRenderer({
antialias:true
});

renderer.setSize(window.innerWidth,window.innerHeight);

document.body.appendChild(renderer.domElement);

renderer.setClearColor(0x87CEEB);

const ambient = new THREE.AmbientLight(0xffffff,1.5);

scene.add(ambient);

const sun = new THREE.DirectionalLight(0xffffff,2);

sun.position.set(10,20,10);

scene.add(sun);

const road = new THREE.Mesh(

new THREE.PlaneGeometry(30,600),

new THREE.MeshStandardMaterial({
color:0x333333
})

);

road.rotation.x = -Math.PI/2;

scene.add(road);

for(let i=0;i<80;i++){

const line = new THREE.Mesh(

new THREE.BoxGeometry(0.5,0.1,4),

new THREE.MeshBasicMaterial({
color:0xffffff
})

);

line.position.z = -i*8;

line.position.y = 0.05;

scene.add(line);

}

function createBuilding(x,z){

const h = Math.random()*25+10;

const building = new THREE.Mesh(

new THREE.BoxGeometry(
Math.random()*5+4,
h,
Math.random()*5+4
),

new THREE.MeshStandardMaterial({
color:0xd0d0d0,
emissive:0x222222
})

);

building.position.set(x,h/2,z);

scene.add(building);

}

for(let i=0;i<120;i++){

const side = Math.random()>0.5 ? 1 : -1;

createBuilding(
side*(Math.random()*20+12),
-Math.random()*600
);

}

const carGroup = new THREE.Group();

const body = new THREE.Mesh(

new THREE.BoxGeometry(2.4,0.7,5),

new THREE.MeshStandardMaterial({
color:0x111111,
metalness:1,
roughness:0.2
})

);

body.position.y = 0.8;

carGroup.add(body);

const top = new THREE.Mesh(

new THREE.BoxGeometry(1.8,0.7,2.5),

new THREE.MeshStandardMaterial({
color:0x222222
})

);

top.position.set(0,1.3,-0.2);

carGroup.add(top);

const spoiler = new THREE.Mesh(

new THREE.BoxGeometry(2,0.1,0.4),

new THREE.MeshStandardMaterial({
color:0x111111
})

);

spoiler.position.set(0,1.2,2.2);

carGroup.add(spoiler);

const neon = new THREE.Mesh(

new THREE.BoxGeometry(2,0.05,4),

new THREE.MeshStandardMaterial({
color:0x00ffcc,
emissive:0x00ffcc,
emissiveIntensity:1
})

);

neon.position.y = 0.2;

carGroup.add(neon);

function wheel(x,z){

const wheel = new THREE.Mesh(

new THREE.CylinderGeometry(0.45,0.45,0.5,32),

new THREE.MeshStandardMaterial({
color:0x000000
})

);

wheel.rotation.z = Math.PI/2;

wheel.position.set(x,0.4,z);

carGroup.add(wheel);

}

wheel(-1,-1.5);
wheel(1,-1.5);
wheel(-1,1.5);
wheel(1,1.5);

scene.add(carGroup);

camera.position.set(0,5,10);

let speed = 0;

document.getElementById("gas").ontouchstart = ()=>{
speed = 1.5;
};

document.getElementById("gas").onmousedown = ()=>{
speed = 1.5;
};

document.getElementById("left").onclick = ()=>{
carGroup.position.x -= 1;
};

document.getElementById("right").onclick = ()=>{
carGroup.position.x += 1;
};

function animate(){

requestAnimationFrame(animate);

scene.children.forEach(obj=>{

if(obj.geometry &&
obj !== carGroup &&
obj.type==="Mesh"){

obj.position.z += speed;

if(obj.position.z > 20){

obj.position.z = -600;

}

}

});

document.getElementById("speed").innerText =
Math.floor(speed*140)+" KM/H";

speed *= 0.992;

renderer.render(scene,camera);

}

animate();

window.addEventListener("resize",()=>{

camera.aspect = window.innerWidth/window.innerHeight;

camera.updateProjectionMatrix();

renderer.setSize(window.innerWidth,window.innerHeight);

});

</script>

</body>
</html>
