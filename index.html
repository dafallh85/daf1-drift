<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DAF1 DRIFT</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial;
}

body{
overflow:hidden;
background:black;
color:white;
}

/* HOME PAGE */

#home{
position:absolute;
width:100%;
height:100vh;

background:
linear-gradient(rgba(0,0,0,.6),rgba(0,0,0,.8)),
url('https://images.unsplash.com/photo-1503376780353-7e6692767b70?q=80&w=1600&auto=format&fit=crop');

background-size:cover;
background-position:center;

display:flex;
justify-content:center;
align-items:center;
flex-direction:column;
text-align:center;
z-index:999;
}

.logo{
font-size:70px;
font-weight:bold;
color:#00ff99;
text-shadow:0 0 25px #00ff99;
}

.subtitle{
font-size:24px;
margin-top:20px;
color:#FFD700;
}

.warning{
margin-top:25px;
background:red;
padding:15px 25px;
border-radius:12px;
font-weight:bold;
font-size:20px;
box-shadow:0 0 20px red;
}

.startBtn{
margin-top:40px;
padding:18px 45px;
font-size:28px;
border:none;
border-radius:14px;
background:#00ff99;
font-weight:bold;
cursor:pointer;
transition:.3s;
}

.startBtn:hover{
transform:scale(1.1);
}

/* GAME */

#game{
display:none;
position:relative;
width:100vw;
height:100vh;
background:#222;
overflow:hidden;
}

.road{
position:absolute;
left:50%;
transform:translateX(-50%);
width:90%;
max-width:500px;
height:100%;
background:#333;
border-left:6px solid white;
border-right:6px solid white;
overflow:hidden;
}

.line{
position:absolute;
left:50%;
transform:translateX(-50%);
width:10px;
height:120px;
background:white;
animation:road 1s linear infinite;
}

@keyframes road{
from{
top:-150px;
}
to{
top:100%;
}
}

.car{
position:absolute;
bottom:30px;
left:45%;
width:70px;
height:120px;
background:red;
border-radius:14px;
box-shadow:0 0 20px red;
}

.enemy{
position:absolute;
top:-150px;
width:70px;
height:120px;
background:#00ff99;
border-radius:14px;
box-shadow:0 0 20px #00ff99;
}

.score{
position:absolute;
top:20px;
left:20px;
font-size:30px;
font-weight:bold;
color:#FFD700;
z-index:999;
}

.gameover{
position:absolute;
top:50%;
left:50%;
transform:translate(-50%,-50%);
font-size:60px;
font-weight:bold;
color:red;
display:none;
z-index:999;
text-shadow:0 0 20px red;
}

</style>
</head>

<body>

<!-- HOME PAGE -->

<div id="home">

<div class="logo">
DAF1 DRIFT
</div>

<div class="subtitle">
Play • Earn • Win
</div>

<div class="warning">
⚠ GAME UNDER DEVELOPMENT
</div>

<button class="startBtn" onclick="startGame()">
START GAME
</button>

</div>

<!-- GAME -->

<div id="game">

<div class="score">
SCORE: <span id="score">0</span>
</div>

<div class="road"></div>

<div class="line" style="animation-delay:0s;"></div>
<div class="line" style="animation-delay:.3s;"></div>
<div class="line" style="animation-delay:.6s;"></div>

<div class="car" id="player"></div>

<div class="gameover" id="gameover">
GAME OVER
</div>

</div>

<script>

const home = document.getElementById('home');
const game = document.getElementById('game');
const player = document.getElementById('player');
const scoreEl = document.getElementById('score');
const gameover = document.getElementById('gameover');

let playerX = window.innerWidth/2 - 35;
let score = 0;
let running = false;

function startGame(){

home.style.display='none';
game.style.display='block';

running = true;

spawnEnemy();

}

/* MOVE PLAYER */

document.addEventListener('touchmove',(e)=>{

if(!running) return;

playerX = e.touches[0].clientX - 35;

if(playerX < 20) playerX = 20;

if(playerX > window.innerWidth - 90)
playerX = window.innerWidth - 90;

player.style.left = playerX + 'px';

});

/* ENEMY */

function spawnEnemy(){

if(!running) return;

const enemy = document.createElement('div');

enemy.classList.add('enemy');

enemy.style.left =
Math.random() * (window.innerWidth - 90) + 'px';

game.appendChild(enemy);

let enemyY = -150;

const move = setInterval(()=>{

if(!running){

clearInterval(move);

return;

}

enemyY += 7;

enemy.style.top = enemyY + 'px';

const p = player.getBoundingClientRect();
const e = enemy.getBoundingClientRect();

if(

p.left < e.right &&
p.right > e.left &&
p.top < e.bottom &&
p.bottom > e.top

){

running = false;

gameover.style.display='block';

}

if(enemyY > window.innerHeight){

enemy.remove();

score++;

scoreEl.innerText = score;

}

},20);

setTimeout(spawnEnemy,1200);

}

</script>

</body>
</html>
