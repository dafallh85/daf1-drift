<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DAF1 Drift</title>

<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&display=swap" rel="stylesheet">

<style>

body{
margin:0;
font-family:'Orbitron',sans-serif;
background:#050816;
color:white;
overflow:hidden;
}

video{
position:fixed;
right:0;
bottom:0;
min-width:100%;
min-height:100%;
object-fit:cover;
z-index:-2;
filter:brightness(0.4);
}

.overlay{
position:absolute;
width:100%;
height:100%;
background:linear-gradient(to bottom,rgba(0,0,0,0.2),rgba(0,0,0,0.9));
z-index:-1;
}

.container{
position:absolute;
top:50%;
left:50%;
transform:translate(-50%,-50%);
text-align:center;
width:90%;
}

.logo{
font-size:60px;
font-weight:700;
color:#00d0ff;
text-shadow:0 0 20px #00d0ff;
}

.subtitle{
margin-top:10px;
font-size:18px;
color:#ccc;
}

.play-btn{
margin-top:40px;
padding:18px 50px;
font-size:22px;
border:none;
border-radius:12px;
background:#00d0ff;
color:black;
font-weight:bold;
cursor:pointer;
transition:0.3s;
box-shadow:0 0 20px #00d0ff;
}

.play-btn:hover{
transform:scale(1.05);
background:white;
}

.wallet{
margin-top:20px;
padding:14px 30px;
font-size:18px;
border:1px solid #00d0ff;
border-radius:10px;
background:transparent;
color:white;
cursor:pointer;
}

.footer{
position:absolute;
bottom:20px;
width:100%;
text-align:center;
font-size:14px;
color:#aaa;
}

</style>
</head>

<body>

<video autoplay muted loop>
<source src="https://cdn.coverr.co/videos/coverr-night-drive-in-the-city-1561577601708?download=1080p" type="video/mp4">
</video>

<div class="overlay"></div>

<div class="container">

<div class="logo">DAF1 DRIFT</div>

<div class="subtitle">
Gulf Cyberpunk Open World Racing
</div>

<button class="play-btn">
PLAY NOW
</button>

<br>

<button class="wallet">
CONNECT WALLET
</button>

</div>

<div class="footer">
Powered by DAF1 Ecosystem
</div>

</body>
</html>
